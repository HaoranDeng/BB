run:
  seed: 1337
  output_dir: ${WORK}/bb/checkpoints/imagenet_vit_b16_paper_scratch
  epochs: 300
  max_steps: 1000000000
  log_every: 100
  eval_every_epochs: 1
  save_every: 1000
  resume: true
  precision: bf16
  compile: false

data:
  dataset: imagenet
  root: ${WORK}/bb/data/imagenet
  train_dir: null
  val_dir: null
  download: false
  synthetic: false
  augment: true
  normalization: value_range
  image_size: 224
  resize_size: 256
  batch_size: 64
  eval_batch_size: 128
  num_workers: 8

model:
  img_size: 224
  patch_size: 16
  in_channels: 3
  embed_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.1
  attn_dropout: 0.0
  attention: standard
  init_scheme: jax
  head_init: zero

optim:
  name: adam
  lr: 0.003
  min_lr: 0.0
  schedule: cosine
  weight_decay: 0.3
  beta1: 0.9
  beta2: 0.999
  weight_decay_filter: kernel
  warmup_steps: 10000
  grad_accum_steps: 16
  grad_clip: 1.0
  label_smoothing: 0.0

logging:
  wandb:
    enabled: true
    project: bb-imagenet-vit
    entity: null
    name: imagenet-vit-b16-paper-scratch-mi2104x
    group: imagenet-vit-b16
    mode: online
    resume: allow
