run:
  seed: 7
  output_dir: checkpoints/smoke_imagenet_vit
  epochs: 1
  max_steps: 2
  log_every: 1
  eval_every_epochs: 1
  precision: fp32
  compile: false

data:
  dataset: imagenet
  root: data/imagenet
  download: false
  synthetic: true
  synthetic_train_samples: 16
  synthetic_val_samples: 8
  augment: false
  image_size: 224
  resize_size: 256
  batch_size: 4
  eval_batch_size: 4
  num_workers: 0

model:
  img_size: 224
  patch_size: 16
  in_channels: 3
  embed_dim: 64
  depth: 2
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.0
  attn_dropout: 0.0

optim:
  name: adam
  lr: 0.001
  min_lr: 0.0
  schedule: cosine
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  warmup_steps: 0
  grad_accum_steps: 1
  grad_clip: 1.0
  label_smoothing: 0.0
