run:
  seed: 1337
  output_dir: checkpoints/smoke
  max_steps: 5
  log_every: 1
  save_every: 5
  precision: bf16
  compile: false

data:
  kind: synthetic
  batch_size: 2
  num_workers: 0
  latent_channels: 4
  latent_size: 16
  text_dim: 128
  max_text_tokens: 16
  synthetic_samples: 64

model:
  latent_size: 16
  patch_size: 2
  in_channels: 4
  out_channels: 4
  hidden_size: 256
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  context_dim: 128
  gradient_checkpointing: false

diffusion:
  prediction_type: epsilon
  min_t: 0.001
  max_t: 0.999

optim:
  lr: 0.0001
  weight_decay: 0.05
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 10
  grad_accum_steps: 1
  grad_clip: 1.0
  ema_decay: 0.999
